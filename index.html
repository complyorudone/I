<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
        }
        img { 
            max-width: 100%;
            max-height: 70vh;
            width: auto;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }
        .button-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .insta-btn {
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .insta-btn:active {
            transform: scale(0.97);
        }
        .finger {
            position: absolute;
            font-size: 45px;
            right: -60px;
            top: 50%;
            transform: translateY(-50%);
            animation: point 1s infinite;
            filter: drop-shadow(0 0 5px white);
        }
        @keyframes point {
            0% { transform: translateY(-50%) translateX(0); opacity: 1; }
            100% { transform: translateY(-50%) translateX(15px); opacity: 0.7; }
        }
    </style>
</head>
<body>
    <img src="3099c5bc380678ffd037b44b3d815dae.webp" alt="">
    <div class="button-area">
        <button class="insta-btn" onclick="window.location.href='https://www.instagram.com/laughout_5'">touch ts</button>
        <div class="finger">👉</div>
    </div>
    <script>
        // Replace with your actual Instagram username/page link
        const btn = document.querySelector('.insta-btn');
        btn.onclick = function() {
            window.location.href = 'https://www.instagram.com/laughout_5';
        };
    </script>
</body>
</html>
